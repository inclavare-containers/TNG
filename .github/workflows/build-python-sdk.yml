name: Build Python SDK

on:
  push:
    branches:
      - 'master'
      - 'native'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - 'master'
      - 'native'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build wheel - ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cargo-zigbuild (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install cargo-zigbuild
          rustup target add ${{ matrix.target }}

      - name: Build tng binary (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo zigbuild -p tng --release --target ${{ matrix.target }}
          mkdir -p tng-python/bin/scripts
          cp target/${{ matrix.target }}/release/tng tng-python/bin/scripts/tng
          chmod +x tng-python/bin/scripts/tng
        working-directory: ${{ github.workspace }}

      - name: Build tng binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo build -p tng --release --target ${{ matrix.target }}
          mkdir -p tng-python/bin/scripts
          cp target/${{ matrix.target }}/release/tng tng-python/bin/scripts/tng
          chmod +x tng-python/bin/scripts/tng
        working-directory: ${{ github.workspace }}

      - name: Build wheel
        run: |
          pip install hatch
          hatch build
        working-directory: tng-python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: tng-python/dist/*.whl

      - name: Install wheel and run tests (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install "dist/$(ls dist/*.whl | head -1 | xargs basename)[dev,requests]"
          pytest tests/test_unit.py -v
          pytest tests/test_integration.py -v -m e2e
        working-directory: tng-python

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "wheel-*/*.whl"
          generate_release_notes: true
