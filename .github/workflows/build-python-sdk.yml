name: Build Python SDK

on:
  push:
    branches:
      - 'master'
      - 'native'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - 'master'
      - 'native'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build wheel - ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build tools
        run: |
          # Install Rust toolchain
          rustup toolchain install 1.89.0 --profile minimal --target ${{ matrix.target }}
          rustup default 1.89.0

          # Install protobuf compiler
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install protobuf
          fi

          # Install cargo-zigbuild for Linux cross-compilation
          if [ "${{ runner.os }}" = "Linux" ]; then
            pip install cargo-zigbuild
          fi
        shell: bash

      - name: Build tng binary (Linux)
        if: runner.os == 'Linux' && matrix.target != 'x86_64-pc-windows-gnu'
        run: |
          cargo zigbuild -p tng --release --target ${{ matrix.target }}
          mkdir -p tng-python/bin/scripts
          cp target/${{ matrix.target }}/release/tng tng-python/bin/scripts/tng
          chmod +x tng-python/bin/scripts/tng
        working-directory: ${{ github.workspace }}

      - name: Build tng binary (macOS)
        if: runner.os == 'macOS'
        run: |
          cargo build -p tng --release --target ${{ matrix.target }}
          mkdir -p tng-python/bin/scripts
          cp target/${{ matrix.target }}/release/tng tng-python/bin/scripts/tng
          chmod +x tng-python/bin/scripts/tng
        working-directory: ${{ github.workspace }}

      - name: Build tng binary (Windows cross)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y mingw-w64
          rustup target add ${{ matrix.target }}
          RUSTFLAGS="--cfg tokio_unstable" cargo zigbuild -p tng --release --target ${{ matrix.target }}
          mkdir -p tng-python/bin/scripts
          cp target/${{ matrix.target }}/release/tng.exe tng-python/bin/scripts/tng.exe
        working-directory: ${{ github.workspace }}

      - name: Build wheel
        run: |
          pip install hatch
          hatch build
        working-directory: tng-python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: tng-python/dist/*.whl

      - name: Run tests (Linux native)
        if: runner.os == 'Linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          pip install "dist/$(ls dist/*.whl | head -1 | xargs basename)[dev]"
          pytest tests/test_unit.py -v
          pytest tests/test_integration.py -v -m e2e
        working-directory: tng-python

      - name: Run tests (Linux cross-build)
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          pip install "dist/$(ls dist/*.whl | head -1 | xargs basename)[dev]"
          pytest tests/test_unit.py -v
        working-directory: tng-python

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4

      - name: Collect wheels
        run: |
          mkdir -p dist
          find wheel-* -name '*.whl' -exec cp {} dist/ \;
          ls dist/

      - name: Publish to PyPI
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "wheel-*/*.whl"
          generate_release_notes: true
