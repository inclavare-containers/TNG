name: Shell Script Tests

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - 'master'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          shellcheck --version 2>/dev/null || {
            wget -qO- "https://github.com/koalaman/shellcheck/releases/download/stable/shellcheck-stable.linux.x86_64.tar.xz" | \
            tar -xJv --strip-components=1 -C /usr/local/bin --wildcards '*/shellcheck'
          }

      - name: Run shellcheck on scripts/
        run: |
          find scripts/ -type f -executable -o -name "*.sh" | while read -r f; do
            echo "=== Checking $f ==="
            shellcheck "$f"
          done
