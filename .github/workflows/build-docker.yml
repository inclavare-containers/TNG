name: Build Docker Image

on:
  push:
    branches:
      - 'master'
      - 'native'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - 'master'
      - 'native'

jobs:
  build:
    runs-on: oracle-vm-16cpu-64gb-x86-64
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker Setup Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: image=moby/buildkit:master,network=host
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/inclavare-containers/tng
          labels: |
            org.opencontainers.image.title=tng
            org.opencontainers.image.description=Trusted Network Gateway
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and export
        uses: docker/build-push-action@v6.9.0
        with:
          target: release
          context: .
          tags: |
            tng:test
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=${{ runner.temp }}/container-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: container-image
          path: ${{ runner.temp }}/container-image.tar

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    needs: build
    container:
      image: alibaba-cloud-linux-3-registry.cn-hangzhou.cr.aliyuncs.com/alinux3/alinux3:latest
      options: --privileged
    steps:
      - name: Install build dependencies
        run: |
          set -e
          set -x

          # replace the mirror
          sed -i -E 's|https?://mirrors.openanolis.cn/anolis/|https://mirrors.aliyun.com/anolis/|g' /etc/yum.repos.d/*.repo
          sed -i -E 's|https?://mirrors.cloud.aliyuncs.com/|https://mirrors.aliyun.com/|g' /etc/yum.repos.d/*.repo

          yum install -y git make tar jq

      - name: Install Podman
        run: |
          yum install -y podman

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: container-image
          path: ${{ runner.temp }}

      - name: Load image
        run: |
          podman load --input ${RUNNER_TEMP}/container-image.tar

      - uses: dtolnay/rust-toolchain@1.89.0

      - uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Run Attestation Agent and Attestation Service
        run: |
          # Start services in background and capture PIDs
          # Use nohup + redirect to avoid Broken pipe when this step's shell exits
          nohup make test-dep-aa > /tmp/aa.log 2>&1 &
          AA_PID=$!
          nohup make test-dep-as > /tmp/as.log 2>&1 &
          AS_PID=$!

          # Wait for Attestation Agent socket (max 1 minute)
          echo "Waiting for Attestation Agent (PID: $AA_PID)..."
          for i in $(seq 1 300); do
            if ! kill -0 $AA_PID 2>/dev/null; then
              echo "Attestation Agent process exited unexpectedly"
              exit 1
            fi
            if [ -S /run/confidential-containers/attestation-agent/attestation-agent.sock ]; then
              echo "Attestation Agent is ready"
              break
            fi
            if [ $i -eq 300 ]; then
              echo "Timeout waiting for Attestation Agent"
              exit 1
            fi
            sleep 1
          done

          # Wait for Attestation Service HTTP (max 1 minute)
          echo "Waiting for Attestation Service (PID: $AS_PID)..."
          for i in $(seq 1 300); do
            if ! kill -0 $AS_PID 2>/dev/null; then
              echo "Attestation Service process exited unexpectedly"
              exit 1
            fi
            if (echo > /dev/tcp/localhost/8080) 2>/dev/null; then
              echo "Attestation Service is ready"
              break
            fi
            if [ $i -eq 300 ]; then
              echo "Timeout waiting for Attestation Service"
              exit 1
            fi
            sleep 1
          done

      - name: Run integration tests
        run: |
          set -e
          set -x

          # Append dns server
          echo "nameserver 8.8.8.8" >> /etc/resolv.conf
          # Run test
          export TNG_TESTSUITE_TNG_IMAGE_URL="tng:test"
          make run-test-on-podman

      - name: Print background service logs
        if: always()
        run: |
          echo "=== Attestation Agent Log ==="
          cat /tmp/aa.log 2>/dev/null || echo "(no log file)"
          echo "=== Attestation Service Log ==="
          cat /tmp/as.log 2>/dev/null || echo "(no log file)"

  push:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: container-image
          path: ${{ runner.temp }}

      - name: Load image
        run: |
          docker load --input ${RUNNER_TEMP}/container-image.tar

      - name: Login to GHCR Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        env:
          IMAGE_TAGS: ${{needs.build.outputs.tags}}
        run: |
          set -e
          set -x

          for tag in ${IMAGE_TAGS}; do
              docker tag tng:test ${tag}
              docker push ${tag}
          done
